[platformio]
data_dir = www

[env:matrix-portal-s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
board_build.filesystem = spiffs
extra_scripts =
    ; Автоматическая прошивка web-раздела после `pio run -t upload` отключена.
    ; Чтобы снова включить постоянную прошивку web-раздела, раскомментируй строку ниже.
    ; Для ручной сборки и прошивки web-раздела используй scripts/upload_www.ps1.
    ; post:scripts/upload_www_after_firmware.py
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-missing-field-initializers
    -DNO_GFX
    -USPIRAM_DMA_BUFFER
build_unflags =
    -std=gnu++11
lib_deps =
    https://github.com/mrcodetastic/ESP32-HUB75-MatrixPanel-DMA.git

; Пины и конфигурацию датчиков держи в include/config/hardware_config.hpp.
; HX711 подтягивается через ESP-IDF Component Manager из src/idf_component.yml.
; HUB75 вывод реализован через ESP32-HUB75-MatrixPanel-DMA в src/display/hub75_display.cpp.
